description: llm-wiki plugin behavioral evals

tracing:
  enabled: true
  otlp:
    http:
      enabled: true
      port: 4318
      acceptFormats: ['json']

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      # Paths here resolve relative to this config file.
      working_dir: ./workspace
      plugins:
        - type: local
          path: ../plugin
      append_allowed_tools: ['Skill', 'Read', 'Write', 'Edit', 'Bash', 'Glob', 'Grep']
      permission_mode: acceptEdits
      max_budget_usd: 2.00
      sandbox:
        enabled: true
        autoAllowBashIfSandboxed: true
      settings:
        permissions:
          allow:
            - 'Read(*)'
            - 'Write(*)'
            - 'Edit(*)'
            - 'Glob(*)'
            - 'Grep(*)'
            - 'Bash(*)'

tests:
  # --- Fuzzy Router ---
  - description: "Router: research intent dispatches correctly"
    vars:
      prompt: "Research the history of testing"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized this as a research request and began searching for sources"
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: URL dispatches to ingest"
    vars:
      prompt: "https://example.com/article-about-testing"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized the URL and routed to ingestion, not query or research"
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: collection import routes to ingest-collection"
    vars:
      prompt: "Import the bitcoin BIPs repo into my bitcoin wiki: https://github.com/bitcoin/bips"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized this as a bounded collection import and routed to the ingest-collection workflow, not single-source URL ingestion."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: collect intent routes to collect before inventory or research"
    vars:
      prompt: "Find, collect, and inventory all the memes you can find for bitcoin"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized this as a collector/catalog request for many discoverable artifacts and routed to the collect workflow, not generic research, collection ingestion, or plain inventory."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: inventory intent routes to inventory"
    vars:
      prompt: "Keep inventory of this Bitcointalk archive as an ingest candidate"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized this as an inventory/tracking request and routed to the inventory workflow, not immediate ingestion, compilation, or output generation."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: inventory question beats generic query"
    vars:
      prompt: "What content in my wiki should become inventory?"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized the inventory signal inside a question and routed to inventory analysis/listing instead of treating it as a generic factual query."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: dataset intent routes to dataset"
    vars:
      prompt: "Index this large Bitcointalk dataset so the wiki can query it without copying the data"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized this as a dataset registry request and routed to the dataset workflow, not single-source ingestion or compilation."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: topic archive routes to archive, not project or dataset"
    vars:
      prompt: "Archive the wiki topic old-bitcoin-notes because I am no longer using it"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent recognized this as a topic/wiki lifecycle archive request and routed to the archive workflow, not project archive, dataset archive, or ingest-collection."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: question dispatches to query"
    vars:
      prompt: "What testing patterns exist for LLM tools?"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Agent treated this as a query against existing wiki content"
        threshold: 0.75
      - type: cost
        threshold: 0.50

  # --- Plan flag routing ---
  - description: "Router: research with --plan routes to research, not /pkb:plan"
    vars:
      prompt: "Research quantum computing threats --plan"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Recognized as a research command with --plan flag. Routed to research (not the separate /pkb:plan command). The --plan flag should trigger parallel multi-path research planning."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  # --- Onboarding flow ---
  - description: "First-run: no wiki shows guided onboarding, not just command list"
    vars:
      prompt: "What can you help me with?"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "If no wiki exists, showed a welcoming onboarding message asking what topic the user wants to research, rather than just dumping a list of commands. If a wiki already exists, showed status."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  # --- Refresh routing ---
  - description: "Router: freshness check routes to refresh"
    vars:
      prompt: "Are my quantum computing articles still up to date?"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Recognized as a freshness check and routed to the refresh command, not query or doctor."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  # --- Librarian routing ---
  - description: "Router: audit intent routes to umbrella audit"
    vars:
      prompt: "Audit this playbook and tell me if I can trust it"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Recognized this as a broad trust audit request. It should route to the umbrella audit workflow, not a plain query and not the narrower librarian-only maintenance scan."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: quality scan routes to librarian"
    vars:
      prompt: "Scan my wiki for quality issues and stale articles"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Recognized as a librarian/quality scan request and routed to the librarian command, not doctor or refresh."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  - description: "Router: librarian report routes correctly"
    vars:
      prompt: "Show me the librarian report"
    assert:
      - type: skill-used
        value: wiki
      - type: llm-rubric
        value: "Recognized as a request for the librarian report, not a generic query."
        threshold: 0.75
      - type: cost
        threshold: 0.50

  # --- Negative controls ---
  - description: "Router: ambiguous single word asks for clarification"
    vars:
      prompt: "testing"
    assert:
      - type: llm-rubric
        value: "Agent asked for clarification or presented a menu rather than guessing a subcommand"
        threshold: 0.50
      - type: cost
        threshold: 0.50

  # --- Plugin loading ---
  - description: "Plugin loads and lists wiki commands"
    vars:
      prompt: "What wiki commands are available? List them briefly."
    assert:
      - type: not-contains
        value: "error loading"
      - type: llm-rubric
        value: "Agent listed pkb subcommands — at minimum ingest, ingest-collection, collect, inventory, dataset, archive, compile, query, doctor, research"
        threshold: 0.75
      - type: cost
        threshold: 0.30
